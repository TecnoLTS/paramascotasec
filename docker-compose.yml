services:
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: next-test-app
    restart: unless-stopped
    environment:
      - TZ=America/Bogota
      - NODE_ENV=development
      - PORT=3000
      - NEXT_PUBLIC_CONTAINER_NAME=next-test
      - CHOKIDAR_USEPOLLING=1
      - WATCHPACK_POLLING=true
    working_dir: /app
    volumes:
      - ./app:/app
      - app_node_modules:/app/node_modules
    command: ["npm","run","dev","--","--hostname","0.0.0.0","--port","3000"]
    networks:
      - edge
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(()=>process.exit(0)).catch(()=>process.exit(1))"]
      interval: 60s
      timeout: 15s
      start_period: 60s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
  nginx:
    image: nginx:alpine
    container_name: next-test-nginx
    depends_on:
      - app
    restart: unless-stopped
    environment:
      - TZ=America/Bogota
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./logs:/var/log/nginx
      - /usr/share/zoneinfo/America/Bogota:/etc/localtime:ro
    networks:
      - edge
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
networks:
  edge:
    external: true
volumes:
  app_node_modules:
