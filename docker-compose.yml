services:
  app:
    profiles: ["production"]
    build:
      context: ./app
      dockerfile: Dockerfile
      args:
        APP_ENV: production
    container_name: paramascotasec-app
    hostname: paramascotasec-app
    restart: unless-stopped
    environment:
      TZ: America/Bogota
      NODE_ENV: production
      APP_ENV: production
      PORT: ${PORT:-3000}
      API_FETCH_TIMEOUT_MS: ${API_FETCH_TIMEOUT_MS:-15000}
      NEXT_PUBLIC_CONTAINER_NAME: next-test
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL}
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL}
      BACKEND_URL_INTERNAL: ${BACKEND_URL_INTERNAL:-http://paramascotasec-backend-web/api}
      BACKEND_SERVICE_TOKEN: ${BACKEND_SERVICE_TOKEN}
    working_dir: /app
    command: npm run start -- --hostname 0.0.0.0 --port ${PORT:-3000}
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    networks:
      edge:
        aliases:
          - next-test-app

  app-dev:
    profiles: ["development"]
    build:
      context: ./app
      dockerfile: Dockerfile
      args:
        APP_ENV: development
    container_name: paramascotasec-app-dev
    hostname: paramascotasec-app-dev
    restart: unless-stopped
    environment:
      TZ: America/Bogota
      NODE_ENV: development
      APP_ENV: development
      PORT: ${PORT:-3000}
      API_FETCH_TIMEOUT_MS: ${API_FETCH_TIMEOUT_MS:-15000}
      NEXT_PUBLIC_CONTAINER_NAME: next-test
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL}
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL}
      BACKEND_URL_INTERNAL: ${BACKEND_URL_INTERNAL:-http://paramascotasec-backend-web/api}
      BACKEND_SERVICE_TOKEN: ${BACKEND_SERVICE_TOKEN}
    working_dir: /app
    command: npm run dev -- --hostname 0.0.0.0 --port ${PORT:-3000}
    volumes:
      - ./app:/app
      - paramascotasec_node_modules:/app/node_modules
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    networks:
      edge:
        aliases:
          - next-test-app

networks:
  edge:
    external: true
    name: edge

volumes:
  paramascotasec_node_modules:
